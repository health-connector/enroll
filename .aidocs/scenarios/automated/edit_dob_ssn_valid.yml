scenario:
  name: "Admin enters valid DOB and SSN"
  description: "Verify that an HBX admin can successfully update DOB and SSN for an enrolled employee"
  tags: [happy_path, hbx_admin, dob_ssn]

  setup:
    auth: admin_login
    setup_script: .aidocs/scripts/qa_seed_hbx_profiles_scenarios.rb
    variant: valid_ssn
    # Background seeds: CCA site, benefit market, employer ACME Widgets Inc.,
    # census employee Patrick Doe, enrolled employee with plan selection,
    # and HBX staff user with HBX staff subrole.

  steps:
    - name: "Navigate to HBX Admin portal"
      url: "/exchanges/hbx_profiles"
      wait_for: "I'm an Admin"
      screenshot: true
      assertions:
        - text_present: "I'm an Admin"

    - name: "Search for employee and open Edit DOB/SSN"
      wait_for: "Employees"
      screenshot: true
      actions:
        - click: "Employees tab"
      assertions:
        - text_present: "Patrick Doe"

    - name: "Open Edit DOB/SSN modal"
      screenshot: true
      actions:
        - click: "Actions for Patrick Doe"
        - click: "Edit DOB / SSN"
      assertions:
        - text_present: "Edit DOB / SSN"

    - name: "Enter valid SSN and submit"
      screenshot: true
      actions:
        - type: { field: "ssn", text: "786120987" }
        - click: "Save"
      assertions:
        - text_present: "SSN/DOB was saved successfully"
        - text_absent: "SSN must"
