name: Security Scan
on:
  workflow_dispatch:
  pull_request:
  schedule:
    - cron: '0 5 * * *'

concurrency:
  group: qb-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundler-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: install bundler-audit
        run: |
          gem install bundler-audit && bundle-audit update
      - name: run bundler-audit
        run: |
          bundle-audit --output=bundler_audit.txt
      - name: upload bundler-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Bundler Report
          path: bundler_audit.txt
      - name: Write to Job Summary
        if: always()
        run: |
          echo "Critical:" >> $GITHUB_STEP_SUMMARY
          cat bundler_audit.txt | grep Critical | wc -l >> $GITHUB_STEP_SUMMARY
          echo "High:" >> $GITHUB_STEP_SUMMARY
          cat bundler_audit.txt | grep High | wc -l >> $GITHUB_STEP_SUMMARY
          echo "Medium:" >> $GITHUB_STEP_SUMMARY
          cat bundler_audit.txt | grep Medium | wc -l >> $GITHUB_STEP_SUMMARY
          echo "Low:" >> $GITHUB_STEP_SUMMARY
          cat bundler_audit.txt | grep Low | wc -l >> $GITHUB_STEP_SUMMARY

  bearer-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true
      - name: install bearer
        run: |
          sudo apt-get install apt-transport-https
          echo "deb [trusted=yes] https://apt.fury.io/bearer/ /" | sudo tee -a /etc/apt/sources.list.d/fury.list
          sudo apt-get update
          sudo apt-get install bearer
      - name: build bearer sarif report
        continue-on-error: true
        run: |
          bearer scan . --format sarif --output bearer-sarif-report.sarif --config-file ./bearer.yml
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: bearer-sarif-report.sarif
      - name: build bearer text report
        continue-on-error: true
        run: |
          bearer scan --quiet --config-file ./bearer.yml .  > bearer_full.txt
      - name: upload bearer text report
        uses: actions/upload-artifact@v4
        with:
          name: bearer-report
          path: bearer_full.txt
      - name: Write to Job Summary
        run: grep -A 10 '=====================================' bearer_full.txt >> $GITHUB_STEP_SUMMARY

  bearer-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: install bearer
        run: |
          sudo apt-get install apt-transport-https
          echo "deb [trusted=yes] https://apt.fury.io/bearer/ /" | sudo tee -a /etc/apt/sources.list.d/fury.list
          sudo apt-get update
          sudo apt-get install bearer
      - name: run bearer
        run: |
          BEARER_DIFF_BASE_BRANCH=master bearer scan --quiet --config-file ./bearer.yml --diff .
      - name: build bearer report
        if: failure()
        run: |
          BEARER_DIFF_BASE_BRANCH=master bearer scan --quiet --config-file ./bearer.yml --diff .  > bearer_full.txt
      - name: upload bearer failure report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: bearer-pr-report
          path: bearer_full.txt
      - name: Write to Job Summary
        if: failure()
        run: grep -A 10 '=====================================' bearer_full.txt >> $GITHUB_STEP_SUMMARY

  brakeman-full:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Brakeman code scanning
        continue-on-error: true
        run: docker run -v "$(pwd)":/code presidentbeef/brakeman -o /dev/stdout -o brakeman.text -o daily_run.json -o brakeman.sarif
      - name: upload Brakeman text report
        uses: actions/upload-artifact@v4
        with:
          name: brakeman-text-report
          path: brakeman.text
      - name: upload Brakeman json report
        uses: actions/upload-artifact@v4
        with:
          name: brakeman-json-report
          path: daily_run.json
      - uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: brakeman.sarif
      - name: Write to Job Summary
        run: cat brakeman.text >> $GITHUB_STEP_SUMMARY

  brakeman-diff:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: "Download artifact"
        run: |
          OTHER_REPO="health-connector/enroll"
          WF_NAME="Security Scan"
          ARTIFACT_NAME="brakeman-json-report"
          RUN_ID=`gh run --repo ${OTHER_REPO} list --workflow "${WF_NAME}" --branch master --status success --json databaseId --jq '.[0].databaseId'`
          gh run --repo ${OTHER_REPO} download ${RUN_ID} -n ${ARTIFACT_NAME}
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Brakeman code scanning
        run: docker run -v "$(pwd)":/code presidentbeef/brakeman --compare daily_run.json -o /dev/stdout -o brakeman_output.text
      - name: upload Brakeman failure report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: brakeman-pr-report
          path: brakeman_output.text
      - name: Write to Job Summary
        if: failure()
        run: cat brakeman_output.text >> $GITHUB_STEP_SUMMARY
